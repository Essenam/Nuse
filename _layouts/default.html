<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} — Nuse</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

<nav>
  <a href="{{ '/' | relative_url }}" class="nav-logo">Nu<span>se</span></a>

  <ul class="nav-links">
    {% if page.lang == 'fr' %}
      <li><a href="/fr/">Accueil</a></li>
      <li><a href="/fr/#how">Comment ça marche</a></li>
      <li><a href="/fr/blog/">Blog</a></li>
      <li><a href="/fr/#contact">Contact</a></li>
    {% else %}
      <li><a href="/en/">Home</a></li>
      <li><a href="/en/#how">How it works</a></li>
      <li><a href="/en/blog/">Blog</a></li>
      <li><a href="/en/#contact">Contact</a></li>
    {% endif %}
  </ul>

  <div class="lang-switcher">
    <a href="/en/" {% if page.lang == 'en' %}class="active"{% endif %}>EN</a>
    <a href="/fr/" {% if page.lang == 'fr' %}class="active"{% endif %}>FR</a>
  </div>
</nav>

{{ content }}

<footer>
  <div class="footer-logo">Nu<span>se</span></div>
  <div>© {{ 'now' | date: "%Y" }} Nuse Solutions · nuseapp.com</div>
  <div>
    <a href="https://linkedin.com/company/nuse" style="color:rgba(255,255,255,0.6); text-decoration:none;">LinkedIn</a>
  </div>
</footer>

</body>
</html>
