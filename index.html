<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nuse</title>
  <script>
    var lang = navigator.language || navigator.userLanguage;
    if (lang && lang.startsWith('fr')) {
      window.location.href = '/Nuse/fr/';
    } else {
      window.location.href = '/Nuse/en/';
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/Nuse/fr/">
  </noscript>
</head>
<body>
  <p><a href="/Nuse/fr/">Français</a> · <a href="/Nuse/en/">English</a></p>
</body>
</html>
