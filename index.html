<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nuse</title>
  <script>
    // Detect browser language, default to French (primary audience)
    var lang = navigator.language || navigator.userLanguage;
    if (lang && lang.startsWith('fr')) {
      window.location.href = '/fr/';
    } else {
      window.location.href = '/en/';
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/fr/">
  </noscript>
</head>
<body>
  <p><a href="/fr/">Français</a> · <a href="/en/">English</a></p>
</body>
</html>
